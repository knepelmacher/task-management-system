@if(user){
    <header class="header">
    <h2 class="greeting">שלום</h2>

    <div class="info-box">
        <div class="one-row">
               <p [innerText]="user.userName"></p>
            </div>
            <div class="one-row">
                <p [innerText]="user.email"></p>
            </div>
            <div class="one-row">
                <p [innerText]="user.phone"></p>
            </div>
        
    </div>
    </header>
}
