<div class="container" *ngIf="(tasksList$ | async) as tasklist; else message">

    <select id="s" [(ngModel)]="selectEnum">
        <option class="o" [value]="-1">{{-1| hebrew}}</option>
        <option class="o"[value]="0">{{0| hebrew}}</option>
        <option class="o" [value]="1">{{1| hebrew}}</option>
        <option class="o"[value]="2">{{2| hebrew}}</option>
        <option class="o"[value]="3">{{3| hebrew}}</option>
    </select>

    <button  (click)="addTask()" [innerText]="'הוסף משימה'" style="width: 10vw;"></button>

    <button type="button" 
            class="button" 
            (click)="changeViewState()" 
            [matBadge]="tasklist.length" 
            matBadgeColor="accent"
            matBadgePosition="above after" >
            <span [innerText]="selectDisplay=== statusspace.Table?'לוח משימות':'טבלה'"></span>
    </button>

    <div *ngIf="selectDisplay === statusspace.Table">
        <app-tasks-dashboard [tasklist]="tasklist | select:selectEnum"></app-tasks-dashboard>
    </div>

    <div *ngIf="selectDisplay === statusspace.Dashboard">
        <app-tasks-table [tasklist]="tasklist | select:selectEnum"></app-tasks-table>
    </div>

</div>

<ng-template #message class="error"> 
  <h1 [innerText]="errorMessage"></h1>
  <img [src]="errorSrc"/>
</ng-template>
